name: Release Dry Run

on:
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to validate"
        required: true
        default: "0.1.0"

env:
  CARGO_TERM_COLOR: always

jobs:
  dry_run:
    name: cargo-release dry run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-nextest and cargo-release
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-release

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang

      - name: Run release helper in dry-run mode
        run: |
          VERSION="${{ github.event.inputs.version || '0.1.0' }}"
          bash scripts/cargo-release.sh "${VERSION}"
