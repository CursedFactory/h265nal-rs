name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality (fmt/clippy/build/docs)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Install dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang

    - name: Check Rust formatting
      run: cargo fmt --all -- --check

    - name: Run clippy (non-blocking)
      continue-on-error: true
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Build workspace
      run: cargo build

    - name: Run doc tests
      run: cargo test --doc

  nextest_by_crate:
    name: Nextest (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [h265nal-sys, h265nal-cli, h265nal-parity, h265nal-test-ports]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Install dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang

    - name: Run nextest for crate
      id: nextest
      shell: bash
      run: |
        set -o pipefail
        cargo nextest run -p ${{ matrix.crate }} --no-tests pass 2>&1 | tee nextest-${{ matrix.crate }}.log

    - name: Add nextest stdout summary
      if: always()
      shell: bash
      env:
        CRATE_NAME: ${{ matrix.crate }}
        NEXTEST_OUTCOME: ${{ steps.nextest.outcome }}
      run: |
        python - <<'PY'
        import os
        import re

        crate = os.environ["CRATE_NAME"]
        outcome = os.environ["NEXTEST_OUTCOME"]
        summary_path = os.environ["GITHUB_STEP_SUMMARY"]
        log_path = f"nextest-{crate}.log"

        with open(log_path, "r", encoding="utf-8", errors="replace") as f:
            raw = f.read()

        ansi = re.compile(r"\x1B(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])")
        clean = ansi.sub("", raw)

        summary_line = "(no summary line emitted)"
        for line in clean.splitlines():
            if "Summary [" in line:
                summary_line = line.strip()

        result_rows = []
        result_re = re.compile(
            r"^\s*(PASS|FAIL|LEAK|SKIP|SLOW|FLAKY)\s+(\[[^\]]+\])\s*(?:\([^\)]*\)\s*)?(.*)$"
        )
        for line in clean.splitlines():
            m = result_re.match(line)
            if not m:
                continue
            status, elapsed, test_name = m.groups()
            result_rows.append((status, elapsed, test_name.replace("|", "\\|")))

        with open(summary_path, "a", encoding="utf-8") as out:
            out.write(f"### Nextest Results: `{crate}`\n\n")
            out.write("| Crate | Step Result | Nextest Summary |\n")
            out.write("|---|---|---|\n")
            out.write(f"| `{crate}` | {outcome} | {summary_line.replace('|', '\\|')} |\n\n")

            out.write("| Status | Time | Test |\n")
            out.write("|---|---|---|\n")
            if result_rows:
                for status, elapsed, test_name in result_rows:
                    out.write(f"| {status} | {elapsed} | `{test_name}` |\n")
            else:
                out.write("| n/a | n/a | `(no PASS/FAIL lines emitted)` |\n")
            out.write("\n")

            out.write("<details><summary>Raw nextest stdout (ANSI preserved)</summary>\n\n")
            out.write("```text\n")
            out.write(raw)
            if not raw.endswith("\n"):
                out.write("\n")
            out.write("```\n")
            out.write("</details>\n")
        PY

  build_cli_artifacts:
    name: Build CLI artifact (${{ matrix.os }})
    needs: [quality, nextest_by_crate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang

    - name: Build CLI artifact (Release)
      run: cargo build --release -p h265nal-cli

    - name: Upload artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: h265nal-cli-linux
        path: target/release/h265nal-cli
        if-no-files-found: error

    - name: Upload artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: h265nal-cli-macos
        path: target/release/h265nal-cli
        if-no-files-found: error
