name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang

    - name: Ensure workspace members exist
      run: |
        if [ ! -f crates/h265nal-test-ports/Cargo.toml ]; then
          mkdir -p crates/h265nal-test-ports/src
          {
            printf '%s\n' '[package]'
            printf '%s\n' 'name = "h265nal-test-ports"'
            printf '%s\n' 'version = "0.0.0"'
            printf '%s\n' 'edition = "2021"'
            printf '%s\n' 'publish = false'
            printf '%s\n' ''
            printf '%s\n' '[lib]'
            printf '%s\n' 'path = "src/lib.rs"'
          } > crates/h265nal-test-ports/Cargo.toml
          printf '%s\n' 'pub fn workspace_placeholder() {}' > crates/h265nal-test-ports/src/lib.rs
        fi

    - name: Check Rust formatting
      run: cargo fmt --all -- --check

    - name: Run clippy (non-blocking)
      continue-on-error: true
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Build
      run: cargo build

    - name: Run nextest (full workspace)
      run: cargo nextest run --workspace

    - name: Run nextest per crate
      run: |
        cargo nextest run -p h265nal-sys --no-tests pass
        cargo nextest run -p h265nal-cli --no-tests pass
        cargo nextest run -p h265nal-parity --no-tests pass
        if [ -f crates/h265nal-test-ports/Cargo.toml ]; then
          cargo nextest run -p h265nal-test-ports --no-tests pass
        fi

    - name: Run doc tests
      run: cargo test --doc

    - name: Build CLI artifact (Release)
      run: cargo build --release -p h265nal-cli

    - name: Upload artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: h265nal-cli-linux
        path: target/release/h265nal-cli
        if-no-files-found: error

    - name: Upload artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: h265nal-cli-macos
        path: target/release/h265nal-cli
        if-no-files-found: error
