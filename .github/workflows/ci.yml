name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality (fmt/clippy/build/docs)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Install dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang

    - name: Check Rust formatting
      run: cargo fmt --all -- --check

    - name: Run clippy (non-blocking)
      continue-on-error: true
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Build workspace
      run: cargo build

    - name: Run doc tests
      run: cargo test --doc

  nextest_by_crate:
    name: Nextest (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [h265nal-sys, h265nal-cli, h265nal-parity, h265nal-test-ports]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Install dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang

    - name: Run nextest for crate
      run: cargo nextest run -p ${{ matrix.crate }} --no-tests pass

  build_cli_artifacts:
    name: Build CLI artifact (${{ matrix.os }})
    needs: [quality, nextest_by_crate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang

    - name: Build CLI artifact (Release)
      run: cargo build --release -p h265nal-cli

    - name: Upload artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: h265nal-cli-linux
        path: target/release/h265nal-cli
        if-no-files-found: error

    - name: Upload artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: h265nal-cli-macos
        path: target/release/h265nal-cli
        if-no-files-found: error
